title: CainCraft Circadia
description: Field Notes and Anecdotes
subtitle: Field Notes and Anecdotes
intro: A running archive of projects, places, experiments, repairs, rides, radio checks, flights, photos, and small observations.
theme: null
markdown: kramdown
paginate: 10
paginate_path: "/page:num/"
plugins:
  - jekyll-paginate
permalink: /:year/:month/:day/:title/
exclude:
  - oauth-proxy
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
