<article class="post-card fade-in">
  <time class="post-date" datetime="{{ include.post.date | date_to_xmlschema }}">
    {{ include.post.date | date: "%B %-d, %Y" }}
  </time>

  {% if include.post.image %}
    <a class="post-image-link" href="{{ include.post.url | relative_url }}" aria-label="Read post from {{ include.post.date | date: '%B %-d, %Y' }}">
      <img
        class="post-image"
        src="{{ include.post.image | relative_url }}"
        alt="{{ include.post.title | default: 'Travel journal photograph' | escape }}"
      >
    </a>
  {% endif %}

  <div class="post-content">
    {{ include.post.content }}
  </div>
</article>
